name: Frontend CI/CD

on:
  push:
    branches: ["main"]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run Lint Check
        run: |
          cd frontend
          npm run lint

      - name: Build Check
        run: |
          cd frontend
          npm run build

  deploy:
    needs: quality-check
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/lightpod/frontend
            git pull origin main
            npm install
            npm run build
            pm2 restart frontend || pm2 start npm --name frontend -- start